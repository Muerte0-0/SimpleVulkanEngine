name: Build Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch: # Allow manual triggering

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Download and install Vulkan SDK
      shell: pwsh
      run: |
        # Download Vulkan SDK installer
        $vulkanVersion = "1.4.341.1"
        $installerUrl = "https://sdk.lunarg.com/sdk/download/$vulkanVersion/windows/VulkanSDK-$vulkanVersion-Installer.exe"
        $installerPath = "$env:TEMP\VulkanSDK-Installer.exe"
        
        Write-Host "Downloading Vulkan SDK..."
        Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
        
        Write-Host "Installing Vulkan SDK silently..."
        Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait
        
        # Add Vulkan SDK to PATH
        $vulkanPath = "C:\VulkanSDK\$vulkanVersion"
        echo "$vulkanPath\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
        # Set VULKAN_SDK environment variable
        echo "VULKAN_SDK=$vulkanPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    
    - name: Configure CMake
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64
    
    - name: Build
      run: |
        cmake --build build --config Release --parallel
    
    - name: Test (if tests available)
      run: |
        if (Test-Path "build\Release\*.exe") {
          Get-ChildItem "build\Release\*.exe" | ForEach-Object {
            Write-Host "Running $($_.Name)..."
            & $_.FullName
          }
        }
      continue-on-error: true

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libxext-dev \
          libwayland-dev \
          libxkbcommon-dev \
          wayland-protocols \
          mesa-utils \
          libgl1-mesa-dev \
          libvulkan-dev \
          vulkan-validationlayers \
          vulkan-tools
        
        # Download and install Vulkan SDK (optional, as libvulkan-dev provides the basics)
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
        sudo apt-get update
        sudo apt-get install -y vulkan-sdk
    
    - name: Configure CMake
      run: |
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cmake --build build --config Release --parallel
    
    - name: Test (if tests available)
      run: |
        if [ -d "build/tests" ]; then
          cd build/tests
          for test in $(find . -executable -type f); do
            echo "Running $test..."
            $test
          done
        fi
      continue-on-error: true

  build-linux-nvidia-docker:
    runs-on: ubuntu-latest
    container:
      image: nvidia/vulkan:1.3.275.0
      options: --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install additional dependencies
      run: |
        apt-get update
        apt-get install -y \
          cmake \
          ninja-build \
          libglfw3-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libxext-dev
    
    - name: Configure CMake
      run: |
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cmake --build build --config Release --parallel
    
    - name: Check Vulkan info
      run: |
        vulkaninfo --summary

  lint-and-format:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format
    
    - name: Check code formatting
      run: |
        find . -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | xargs clang-format -style=file -i
        git diff --exit-code || (echo "Code formatting issues found. Run clang-format." && exit 1)
    
    - name: Run cppcheck (static analysis)
      run: |
        sudo apt-get install -y cppcheck
        cppcheck --enable=all --suppress=missingIncludeSystem --error-exitcode=1 ./src

  dependency-cache:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Cache dependencies
      uses: actions/cache@v3
      id: cache-deps
      with:
        path: |
          ~/.cache/vulkan-sdk
          ~/.cache/glfw
          ~/.cache/tinyobjloader
        key: ${{ runner.os }}-deps-${{ hashFiles('**/CMakeLists.txt') }}
    
    - name: Download dependencies (if cache miss)
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/.cache/vulkan-sdk
        mkdir -p ~/.cache/glfw
        mkdir -p ~/.cache/tinyobjloader
        
        # Download GLFW source
        wget -qO- https://github.com/glfw/glfw/archive/refs/tags/3.3.9.tar.gz | tar xz -C ~/.cache/glfw
        
        # Download tinyobjloader
        wget -qO- https://github.com/tinyobjloader/tinyobjloader/archive/refs/tags/v2.0-rc1.tar.gz | tar xz -C ~/.cache/tinyobjloader

  # Optional: Create a combined badge status
  build-status:
    needs: [build-windows, build-linux, build-linux-nvidia-docker, lint-and-format]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check build status
      run: |
        echo "Windows Build: ${{ needs.build-windows.result }}"
        echo "Linux Build: ${{ needs.build-linux.result }}"
        echo "Linux NVIDIA Docker: ${{ needs.build-linux-nvidia-docker.result }}"
        echo "Lint & Format: ${{ needs.lint-and-format.result }}"
        
        if [ "${{ needs.build-windows.result }}" = "success" ] && \
           [ "${{ needs.build-linux.result }}" = "success" ] && \
           [ "${{ needs.build-linux-nvidia-docker.result }}" = "success" ] && \
           [ "${{ needs.lint-and-format.result }}" = "success" ]; then
          echo "All builds passed!"
          exit 0
        else
          echo "Some builds failed!"
          exit 1
        fi
