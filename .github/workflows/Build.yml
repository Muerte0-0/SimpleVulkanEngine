name: Build Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Install Vulkan SDK
      uses: humbletim/install-vulkan-sdk@v1.2
      with:
        version: 1.4.341.1
        cache: true

    - name: Set Vulkan SDK environment variables (Windows)
      shell: pwsh
      run: |
        $VulkanVersion = "1.4.341.1"
        $VulkanPath = "C:\VulkanSDK\$VulkanVersion"
        
        # Set environment variables
        echo "VULKAN_SDK=$VulkanPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "$VulkanPath\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
        # Also set for current session
        $env:VULKAN_SDK = $VulkanPath
        $env:PATH += ";$VulkanPath\Bin"
        
        # Create CMake toolchain file to help find Vulkan
        $CMakeConfig = @"
set(Vulkan_INCLUDE_DIR "$VulkanPath/Include")
set(Vulkan_LIBRARY "$VulkanPath/Lib/vulkan-1.lib")
set(Vulkan_ROOT "$VulkanPath")
"@
        $CMakeConfig | Out-File -FilePath "${{ github.workspace }}/vulkan-config.cmake" -Encoding utf8
        
        Write-Host "VULKAN_SDK set to: $env:VULKAN_SDK"
        Write-Host "PATH includes: $env:PATH"
        
        # Verify Vulkan files exist
        Write-Host "Checking Vulkan files:"
        if (Test-Path "$VulkanPath\Include\vulkan\vulkan.h") {
          Write-Host "✓ vulkan.h found"
        } else {
          Write-Host "✗ vulkan.h not found"
        }
        if (Test-Path "$VulkanPath\Lib\vulkan-1.lib") {
          Write-Host "✓ vulkan-1.lib found"
        } else {
          Write-Host "✗ vulkan-1.lib not found"
        }
    
    - name: Configure CMake (Windows)
      shell: pwsh
      run: |
        $VulkanVersion = "1.4.341.1"
        $VulkanPath = "C:\VulkanSDK\$VulkanVersion"
        
        # Configure with explicit Vulkan paths
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DVulkan_INCLUDE_DIR="$VulkanPath/Include" `
          -DVulkan_LIBRARY="$VulkanPath/Lib/vulkan-1.lib" `
          -DCMAKE_PREFIX_PATH="$VulkanPath"
    
    - name: Build
      run: |
        cmake --build build --config Release --parallel
    
    - name: Test (if tests available)
      run: |
        if (Test-Path "build\Release\*.exe") {
          Get-ChildItem "build\Release\*.exe" | ForEach-Object {
            Write-Host "Running $($_.Name)..."
            & $_.FullName
          }
        }
      continue-on-error: true

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Vulkan SDK (Linux)
      run: |
        # Add LunarG repository for Vulkan SDK
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
        sudo apt-get update
        
        # Install Vulkan SDK and dependencies
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          vulkan-sdk \
          libvulkan-dev \
          vulkan-validationlayers \
          vulkan-tools \
          libglfw3-dev \
          libglm-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libxext-dev \
          libwayland-dev \
          libxkbcommon-dev \
          wayland-protocols \
          mesa-utils \
          libgl1-mesa-dev
        
        # Set environment variables
        echo "VULKAN_SDK=/usr" >> $GITHUB_ENV
        
        # Verify installation
        vulkaninfo --summary
        which vulkaninfo
    
    - name: Configure CMake (Linux)
      run: |
        cmake -B build -G "Ninja" \
          -DCMAKE_BUILD_TYPE=Release \
          -DVulkan_INCLUDE_DIR=/usr/include \
          -DVulkan_LIBRARY=/usr/lib/x86_64-linux-gnu/libvulkan.so
    
    - name: Build
      run: |
        cmake --build build --config Release --parallel
    
    - name: Test (if tests available)
      run: |
        if [ -d "build/tests" ]; then
          cd build/tests
          for test in $(find . -executable -type f); do
            echo "Running $test..."
            $test
          done
        fi
      continue-on-error: true

  # Simpler Linux build without NVIDIA Docker (since it was causing issues)
  build-linux-simple:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          libvulkan-dev \
          vulkan-validationlayers \
          libglfw3-dev \
          libglm-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libxext-dev
    
    - name: Configure CMake
      run: |
        cmake -B build -G "Ninja" \
          -DCMAKE_BUILD_TYPE=Release \
          -DVulkan_INCLUDE_DIR=/usr/include \
          -DVulkan_LIBRARY=/usr/lib/x86_64-linux-gnu/libvulkan.so
    
    - name: Build
      run: |
        cmake --build build --config Release --parallel

  lint-and-format:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format cppcheck
    
    - name: Check code formatting
      run: |
        find . -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | xargs clang-format -style=file -i
        git diff --exit-code || (echo "Code formatting issues found. Run clang-format." && exit 1)
    
    - name: Run cppcheck (static analysis)
      run: |
        cppcheck --enable=all --suppress=missingIncludeSystem --error-exitcode=1 --inline-suppr \
          --suppress=unmatchedSuppression:./src/* \
          ./src 2> cppcheck-errors.txt || true
        if [ -s cppcheck-errors.txt ]; then
          cat cppcheck-errors.txt
          exit 1
        fi

  build-status:
    needs: [build-windows, build-linux, build-linux-simple, lint-and-format]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check build status
      run: |
        echo "Windows Build: ${{ needs.build-windows.result }}"
        echo "Linux Build: ${{ needs.build-linux.result }}"
        echo "Linux Simple Build: ${{ needs.build-linux-simple.result }}"
        echo "Lint & Format: ${{ needs.lint-and-format.result }}"
        
        if [ "${{ needs.build-windows.result }}" = "success" ] && \
           [ "${{ needs.build-linux.result }}" = "success" ] && \
           [ "${{ needs.build-linux-simple.result }}" = "success" ] && \
           [ "${{ needs.lint-and-format.result }}" = "success" ]; then
          echo "All builds passed!"
          exit 0
        else
          echo "Some builds failed!"
          exit 1
        fi
